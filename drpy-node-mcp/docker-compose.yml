version: '3.8'

services:
  drpy-node-mcp:
    build:
      context: ..
      dockerfile: drpy-node-mcp/Dockerfile
    container_name: drpy-node-mcp
    restart: unless-stopped
    environment:
      - MCP_MODE=sse
      - PORT=57579
      - ROOT=/project
    ports:
      - "57579:57579"
    # 将 drpy-node 挂载到容器内的 /project，MCP 服务 (运行在 /app) 将跨目录访问它
    volumes:
      - ../:/project

